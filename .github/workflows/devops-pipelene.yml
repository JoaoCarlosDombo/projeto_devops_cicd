name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # IMPORTANTE: Substitua 'seu_usuario_dockerhub' pelo seu nome de usuario real do Docker Hub
  DOCKERHUB_REPO: Jhon Carlos/projeto_devops_cicd

jobs:
  integration-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Baixar o codigo
      uses: actions/checkout@v5

    - name: Configurar Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 24

    - name: Instalar dependencias
      run: npm install

    - name: Validar sintaxe do codigo
      run: node -c app.js

  build-and-push-image:
    needs: integration-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Baixar o codigo
      uses: actions/checkout@v5

    - name: Fazer login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir e enviar a imagem para o Docker Hub
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKERHUB_REPO }}:latest
          ${{ env.DOCKERHUB_REPO }}:${{ github.sha }}